name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - name: Test
        run: |
          go run ./build/build.go --target Run-Tests
      - uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: test-report
          path: reports/junit-test-report.xml
      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: test-results
          path: reports/junit-test-report.xml
          reporter: java-junit
